version: "3.9"

services:
  # ===========================================
  # Infrastructure Services
  # ===========================================
  
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docgen-postgres
    environment:
      POSTGRES_USER: docgen
      POSTGRES_PASSWORD: docgen
      POSTGRES_DB: docgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: docgen-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: docgen-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/docgen-artifacts --ignore-existing;
      mc anonymous set download myminio/docgen-artifacts;
      exit 0;
      "

  # ===========================================
  # Application Services (for full deployment)
  # ===========================================

  # Uncomment for full Docker deployment
  # web:
  #   build:
  #     context: .
  #     dockerfile: apps/web/Dockerfile
  #   container_name: docgen-web
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #     - NEXTAUTH_URL=http://localhost:3000
  #   depends_on:
  #     - api

  # api:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile
  #   container_name: docgen-api
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     - NODE_ENV=production
  #     - DATABASE_URL=postgresql://docgen:docgen@postgres:5432/docgen
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # worker:
  #   build:
  #     context: .
  #     dockerfile: services/worker/Dockerfile
  #   container_name: docgen-worker
  #   environment:
  #     - NODE_ENV=production
  #     - DATABASE_URL=postgresql://docgen:docgen@postgres:5432/docgen
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # ===========================================
  # Sandbox Services
  # ===========================================

  sandbox-python:
    build:
      context: ./services/sandbox-python
      dockerfile: Dockerfile
    container_name: docgen-sandbox-python
    ports:
      - "8001:8001"
    volumes:
      - sandbox_python_tmp:/tmp
    security_opt:
      - no-new-privileges:true
    # Network isolation for security
    # networks:
    #   - sandbox-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  sandbox-repo:
    build:
      context: ./services/sandbox-repo
      dockerfile: Dockerfile
    container_name: docgen-sandbox-repo
    ports:
      - "8002:8002"
    volumes:
      - sandbox_repo_tmp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sandbox_python_tmp:
  sandbox_repo_tmp:

