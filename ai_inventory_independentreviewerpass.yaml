agent:
  type: Agent
  name: independentReviewerPass
  description: The independentReviewerPass agent serves as a documentation reviewer, identifying substantive gaps where
    sections lack specific details, supporting evidence, or clarity. It provides constructive feedback to enhance the
    documentation's quality.
  foundationModel: gpt-4o
  framework: OpenAI Agent
  detectionMethod: structural
  sourceFile: apps/web/src/lib/openai.ts
  confidence: 95%
  tools:
    - parseDataFile
    - generateEmbeddings
    - generateSchemaAuditCodeFromPath
    - getAvailableTools
    - llm-tools
    - openai-config
    - openai
  connectors: []
  dataInputs:
    - Documentation content
  dataOutputs:
    - JSON object indicating whether gaps exist and detailed descriptions with suggestions
  owner: Elena Rodriguez <elena.rodriguez@pwc.com>
  riskTier: ""
  classification: ""
  prompts:
    - role: system
      file: apps/web/src/lib/openai.ts
      startLine: 2016
      content: >-
        You are an independent documentation reviewer. Your job is to identify gaps where:
                                1. The section could be enhanced with more specific details
                                2. Claims are made without supporting evidence 
                                3. Important aspects are mentioned but not fully explained
                                4. The section seems generic rather than specific to this codebase

                                Return JSON: { "hasGaps": boolean, "gaps": [{ "description": "...", "suggestion": "..." }] }

                                Be constructive but critical. Only flag substantive issues, not minor style concerns.
